name: CI — Test & Check

on:
  pull_request:
    branches: [development, staging, master]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  docker-check:
    name: Docker build checks (lint)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validate Dockerfile best practices before wasting build time (reuse GHA cache when available)
      - name: Docker build checks (lint)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          check: true
          cache-from: type=gha
