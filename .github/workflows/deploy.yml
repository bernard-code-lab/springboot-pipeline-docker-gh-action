name: Deploy — Build, Scan & Push

# Push to development/staging/master runs tests, then build + scan + push + attestation.
on:
  push:
    branches:
      - development
      - staging
      - master

# Single source of truth: change here to reuse across metadata, attestation, summary, Docker Hub.
# GHCR owner must be the GitHub user/org that owns the repo (use github.repository_owner).
env:
  IMAGE_NAME: springboot-pipeline-docker-gh-action
  DOCKERHUB_NAMESPACE: rafaelc869
  GHCR_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Unit Tests (gate before any build)
  # ─────────────────────────────────────────
  test:
    uses: ./.github/workflows/test.yml

  # ─────────────────────────────────────────
  # JOB 2: Build, Scan & Push
  # ─────────────────────────────────────────
  build-and-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: test   # Only runs if tests pass
    # Outputs for downstream deploy/rollback: use needs.build-and-push.outputs.image_digest | image_sha_tag
    outputs:
      image_digest: ${{ steps.summary.outputs.digest }}
      image_sha_tag: ${{ steps.summary.outputs.sha_tag }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Branch → environment and primary registry (extend BRANCHES_USE_DOCKERHUB for new branches)
      - name: Set environment context
        id: env
        env:
          BRANCHES_USE_DOCKERHUB: "master staging"
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "environment=$BRANCH" >> $GITHUB_OUTPUT
          if echo "$BRANCHES_USE_DOCKERHUB" | grep -qw "$BRANCH"; then
            echo "registry_prefix=docker.io/${{ env.DOCKERHUB_NAMESPACE }}" >> $GITHUB_OUTPUT
          else
            echo "registry_prefix=ghcr.io/${{ env.GHCR_NAMESPACE }}" >> $GITHUB_OUTPUT
          fi

      # Install Docker Engine (ensures latest stable version on runner)
      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      # QEMU enables cross-compilation for ARM64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Boot BuildKit builder with parallel workers
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [worker.oci]
              max-parallelism = 4

      # Install Compose (used for integration test spin-up)
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      # Generate tags, labels and annotations from Git metadata
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.env.outputs.environment }}
            type=semver,pattern={{version}},enable=${{ github.ref_name == 'master' }}
          annotations: |
            org.opencontainers.image.description=${{ env.IMAGE_NAME }} REST API — ${{ steps.env.outputs.environment }}
            org.opencontainers.image.licenses=MIT

      # TAG fallback for Bake: use semver version or sha-<short> when no tag
      - name: Set TAG for Bake
        id: tag
        run: |
          if [ -n "${{ steps.meta.outputs.version }}" ]; then
            echo "tag=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      # Copy metadata bake file into workspace so BuildKit (docker-container driver) can access it
      - name: Copy metadata bake file to workspace
        run: cp "${{ steps.meta.outputs.bake-file }}" ./docker-metadata-bake.json

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      # Login to GHCR (used for development builds)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build image locally first (no push) to run tests against it
      - name: Build image for testing (export to Docker daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: springboot-pipeline-docker-gh-action:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Spin up the app + dependencies and run integration smoke test (retry until health responds)
      - name: Run integration tests with Compose
        run: |
          docker compose -f docker-compose.yml up -d
          for i in 1 2 3 4 5; do
            curl -sf http://localhost:8080/actuator/health && break
            [ $i -eq 5 ] && exit 1
            sleep 3
          done
          docker compose down

      # Scan the locally built image for vulnerabilities BEFORE push
      - name: Docker Scout — CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: springboot-pipeline-docker-gh-action:test
          only-severities: critical,high
          exit-code: true   # Fails the pipeline if critical CVEs found

      # Build final multi-platform image using Bake and push to registries
      # Use source: . so both docker-bake.hcl and docker-metadata-bake.json (generated) are in workspace
      - name: Build and push with Bake
        id: bake
        uses: docker/bake-action@v6
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          TAG: ${{ steps.tag.outputs.tag }}
        with:
          source: .
          files: |
            ./docker-bake.hcl
            ./docker-metadata-bake.json
          push: true
          set: |
            springboot-pipeline-docker-gh-action.cache-from=type=gha
            springboot-pipeline-docker-gh-action.cache-to=type=gha,mode=max

      # Attest provenance and SBOM to the pushed image (digest from bake metadata)
      # Pass metadata via env to avoid shell syntax errors from inlining JSON (quotes, parentheses)
      - name: Get image digest for attestation
        id: attest
        env:
          BAKE_TARGET: ${{ env.IMAGE_NAME }}
          METADATA_JSON: ${{ steps.bake.outputs.metadata }}
        run: |
          echo "$METADATA_JSON" > /tmp/bake-metadata.json
          DIGEST=$(jq -r --arg t "$BAKE_TARGET" '.[$t]["containerimage.digest"] // empty' /tmp/bake-metadata.json)
          if [ -z "$DIGEST" ]; then
            echo "Could not get digest from bake metadata (target=$BAKE_TARGET)"
            exit 1
          fi
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.env.outputs.registry_prefix }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.attest.outputs.digest }}
          push-to-registry: true

      # Expose digest and sha tag for deploy/rollback (job summary and outputs)
      - name: Publish image summary and outputs
        id: summary
        env:
          REGISTRY_PREFIX: ${{ steps.env.outputs.registry_prefix }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          DIGEST="${{ steps.attest.outputs.digest }}"
          SHA_TAG="sha-${GITHUB_SHA:0:7}"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "## Image (deploy / rollback)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Reference | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **By digest** | \`${REGISTRY_PREFIX}/${IMAGE_NAME}@${DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Immutable tag** | \`${REGISTRY_PREFIX}/${IMAGE_NAME}:${SHA_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use digest or \`sha-*\` tag for rollback and idempotent deploy." >> $GITHUB_STEP_SUMMARY
